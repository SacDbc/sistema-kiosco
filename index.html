<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscoEnLínea - Sistema de Gestión</title>
    <!-- Hoja de Estilos propia desglosada -->
    <link rel="stylesheet" href="styles.css">
    <!-- Librería oficial de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <h1>🏪 KioscoEnLínea</h1>
    <nav class="nav-tabs">
        <button id="btn-tab-ventas" class="tab-btn activo" onclick="cambiarPestaña('ventas')">🛒 Punto de Venta</button>
        <button id="btn-tab-stock" class="tab-btn" onclick="cambiarPestaña('stock')">📦 Control de Stock</button>
    </nav>
</header>

<div class="container">

    <!-- SECCIÓN VENTAS -->
    <section id="seccion-ventas" class="seccion activa">
        <div class="grid-ventas">
            <main class="modulo-ventas">
                <div class="contenedor-buscador">
                    <input type="text" id="buscador" class="buscador" placeholder="⚡ Pistoleá código o busca (ej: 5*codigo)..." autofocus onkeypress="manejarEnter(event)" oninput="buscarProductosLive()">
                    <div id="desplegable-resultados" class="desplegable-resultados"></div>
                </div>

                <div class="titulo-favoritos">⭐ Productos Rápidos</div>
                <div id="contenedor-favoritos" class="grid-favoritos"></div>
            </main>

            <aside class="modulo-carrito">
                <h2>Detalle de Venta</h2>
                <table class="tabla-carrito">
                    <thead>
                        <tr>
                            <th>Cant</th>
                            <th>Prod</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="carrito-items-body"></tbody>
                </table>

                <div class="total-box">
                    Total: $<span id="total-monto">0</span>
                </div>
                <button id="btn-cobrar" class="btn-cobrar" onclick="abrirModalCobro()">💵 COBRAR</button>
            </aside>
        </div>
    </section>

    <!-- SECCIÓN STOCK -->
    <section id="seccion-stock" class="seccion">
        <div class="modulo-stock">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Inventario de Productos</h2>
                <button class="btn-crear" onclick="abrirModal()">➕ Nuevo Producto</button>
            </div>

            <table class="tabla-stock">
                <thead>
                    <tr>
                        <th>Código Barcode</th>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Stock Actual</th>
                    </tr>
                </thead>
                <tbody id="tabla-body-stock"></tbody>
            </table>
        </div>
    </section>

</div>

<!-- Modal Producto Nuevo -->
<div id="modal-producto" class="modal">
    <div class="modal-contenido">
        <h2>Nuevo Producto</h2>
        <input type="text" id="p-nombre" placeholder="Nombre (Ej: Coca 500ml)">
        <input type="number" id="p-precio" placeholder="Precio ($)">
        <input type="number" id="p-stock" placeholder="Stock Inicial">
        <input type="text" id="p-codigo" placeholder="Código de Barras (Opcional)">
        
        <div class="modal-acciones">
            <button class="btn-guardar" onclick="guardarNuevoProducto()">Guardar</button>
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal Cobro / Medios de Pago y Vuelto -->
<div id="modal-cobro" class="modal">
    <div class="modal-contenido">
        <h2>Cobrar Venta</h2>
        <p style="font-size:18px;">Total a Pagar: <strong style="color:#28a745;">$<span id="modal-total-pagar">0</span></strong></p>

        <label style="font-size:13px; font-weight:bold; color:#666;">SELECCIONÁ MEDIO DE PAGO:</label>
        <div class="medios-pago">
            <button id="btn-pago-efectivo" class="btn-pago seleccionado" onclick="seleccionarMedioPago('Efectivo')">💵 Efectivo</button>
            <button id="btn-pago-qr" class="btn-pago" onclick="seleccionarMedioPago('QR')">📲 QR MP</button>
            <button id="btn-pago-transf" class="btn-pago" onclick="seleccionarMedioPago('Transferencia')">🏦 Transf.</button>
        </div>

        <div id="bloque-efectivo">
            <label style="font-size:13px; font-weight:bold; color:#666;">PAGA CON ($):</label>
            <input type="number" id="monto-recibido" placeholder="Ej: 5000" oninput="calcularVuelto()">
            
            <div class="billetes-rapidos">
                <button class="btn-billete" onclick="setMontoRecibido(2000)">$2.000</button>
                <button class="btn-billete" onclick="setMontoRecibido(5000)">$5.000</button>
                <button class="btn-billete" onclick="setMontoRecibido(10000)">$10.000</button>
                <button class="btn-billete" onclick="setMontoRecibido(20000)">$20.000</button>
            </div>

            <div class="box-vuelto">
                <small style="color:#2e7d32; font-weight:bold;">VUELTO A ENTREGAR:</small>
                <div class="monto-vuelto">$<span id="monto-vuelto-text">0</span></div>
            </div>
        </div>

        <div class="modal-acciones">
            <button id="btn-confirmar-venta" class="btn-guardar" onclick="confirmarVentaFinal()">✔ FINALIZAR VENTA</button>
            <button class="btn-cancelar" onclick="cerrarModalCobro()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Lógica principal desglosada -->
<script src="app.js"></script>

</body>
</html>
